<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Icon Export - 1024x1024</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #888;
        }
        .app-icon {
            width: 1024px;
            height: 1024px;
            position: relative;
            /* NO border-radius — iOS adds the squircle mask automatically */
            background: linear-gradient(135deg, #1E3A2F 0%, #152B22 100%);
            overflow: hidden;
        }
        .noise-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }
        .graphic-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Scale factor: 1024/240 ≈ 4.267 */
        .link {
            position: absolute;
            width: 427px;
            height: 597px;
            border-radius: 213px;
            border: 119px solid;
        }
        .link-left {
            border-color: #F7F5F0;
            transform: translateX(-77px) rotate(-15deg);
            z-index: 2;
            box-shadow: 0 17px 51px rgba(0, 0, 0, 0.1);
        }
        .link-right {
            border-color: #EBE8E0;
            background-color: transparent;
            transform: translateX(77px) rotate(-15deg);
            z-index: 1;
        }
        .weave-patch {
            position: absolute;
            width: 427px;
            height: 597px;
            border-radius: 213px;
            border: 119px solid #EBE8E0;
            transform: translateX(77px) rotate(-15deg);
            z-index: 3;
            clip-path: polygon(0% 60%, 100% 60%, 100% 100%, 0% 100%);
        }
        .link::after {
            content: '';
            position: absolute;
            inset: -119px;
            border-radius: 213px;
            border: 119px solid transparent;
            box-shadow: inset 4px 4px 17px rgba(0,0,0,0.05);
            pointer-events: none;
        }
        .shadow-patch {
            position: absolute;
            width: 171px;
            height: 171px;
            background: radial-gradient(circle, rgba(74, 90, 82, 0.25) 0%, transparent 70%);
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div class="app-icon" id="icon">
        <div class="noise-overlay"></div>
        <div class="graphic-container">
            <div class="link link-right"></div>
            <div class="shadow-patch"></div>
            <div class="link link-left"></div>
            <div class="weave-patch"></div>
        </div>
    </div>
</body></html>
